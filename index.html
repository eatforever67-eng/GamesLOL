<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Initial Default Masking Configuration -->
    <title id="tab-title">Classes</title>
    <link id="tab-icon" rel="icon" type="image/png" href="https://gstatic.com">

    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif; background-color: #121212; color: white;
            overflow: hidden; display: flex; flex-direction: column;
        }
        
        /* Dashboard Control Bar */
        .navbar {
            background-color: #1e1e1e; padding: 8px 16px;
            display: flex; gap: 12px; align-items: center; border-bottom: 2px solid #2d2d2d;
            z-index: 100;
        }
        .logo { font-weight: bold; color: #4CAF50; font-size: 14px; margin-right: 10px; }
        .nav-btn {
            background-color: #2a2a2a; color: #e0e0e0; border: 1px solid #3d3d3d;
            padding: 6px 12px; border-radius: 4px; cursor: pointer;
            font-size: 13px; font-weight: 500; transition: all 0.2s;
        }
        .nav-btn:hover { background-color: #3a3a3a; border-color: #4CAF50; }
        .nav-btn.active { background-color: #4CAF50; color: white; border-color: #4CAF50; }
        .settings-btn { margin-left: auto; background-color: #333; }

        /* Interface Wrapper */
        .main-viewport { flex: 1; position: relative; width: 100%; height: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Local Modular Settings Panel Overlay */
        .settings-overlay {
            display: none; position: absolute; top: 55px; right: 20px;
            background-color: #1e1e1e; border: 2px solid #333; border-radius: 8px;
            padding: 20px; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 200;
        }
        .settings-overlay h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 8px; color: #4CAF50; }
        .setting-group { margin-bottom: 14px; }
        .setting-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .setting-group input, .setting-group select {
            width: 100%; background: #2b2b2b; border: 1px solid #444; color: white;
            padding: 6px; border-radius: 4px; font-size: 13px;
        }
        .close-settings {
            width: 100%; background: #4CAF50; color: white; border: none;
            padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Tab Selection Menu -->
    <div class="navbar">
        <span class="logo" id="nav-brand-text">Portal</span>
        <button class="nav-btn active" onclick="loadFrame('https://precisionclient.vercel.app', this)">Precision Client (MC)</button>
        <button class="nav-btn" onclick="loadFrame('https://veck.io', this)">Veck.io</button>
        <button class="nav-btn" onclick="loadFrame('https://frg.tech', this)">Slope (Proxy)</button>
        <button class="settings-btn nav-btn" onclick="toggleSettingsForm()">⚙️ Options</button>
    </div>

    <!-- The Sandbox Frame Container -->
    <div class="main-viewport">
        <iframe id="game-frame" src="https://precisionclient.vercel.app" allow="pointer-lock; fullscreen;"></iframe>

        <!-- Modal Engine Controls -->
        <div class="settings-overlay" id="settings-panel">
            <h3>Custom Settings</h3>
            
            <div class="setting-group">
                <label>Tab Mask Mask Preset</label>
                <select id="mask-select" onchange="applyMaskPreset(this.value)">
                    <option value="classroom">Google Classroom</option>
                    <option value="drive">Google Drive</option>
                    <option value="docs">Google Docs</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Custom Tab Title</label>
                <input type="text" id="custom-title-input" value="Classes" oninput="updateTabTitle(this.value)">
            </div>

            <div class="setting-group">
                <label>Panic Emergency Hotkey</label>
                <select id="panic-key-select" onchange="updatePanicKey(this.value)">
                    <option value="Escape">Escape Key</option>
                    <option value="`">Backtick Key (`)</option>
                    <option value="q">"Q" Key</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Panic Redirect Destination URL</label>
                <input type="text" id="panic-url-input" value="https://classroom.google.com" oninput="updatePanicUrl(this.value)">
            </div>

            <button class="close-settings" onclick="toggleSettingsForm()">Save & Exit</button>
        </div>
    </div>

    <script>
        // Core System Local Configuration State Object
        let sysConfig = {
            panicKey: 'Escape',
            panicDestination: 'https://classroom.google.com'
        };

        // Initialize and trap user browser tracking loops
        window.onload = function() {
            deployHistoryShield();
        };

        function deployHistoryShield() {
            for (let i = 0; i < 10; i++) {
                window.history.pushState({ sessionIndex: i }, "", window.location.pathname + "?resource=v" + i);
            }
        }

        function loadFrame(url, button) {
            document.getElementById('game-frame').src = url;
            let buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if(button) button.classList.add('active');
            deployHistoryShield();
        }

        function toggleSettingsForm() {
            let panel = document.getElementById('settings-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function updateTabTitle(val) {
            document.getElementById('tab-title').innerText = val;
            document.getElementById('nav-brand-text').innerText = val;
        }

        function updatePanicKey(val) { sysConfig.panicKey = val; }
        function updatePanicUrl(val) { sysConfig.panicDestination = val; }

        function applyMaskPreset(type) {
            let titleInp = document.getElementById('custom-title-input');
            let iconEl = document.getElementById('tab-icon');
            
            if (type === 'classroom') {
                titleInp.value = "Classes";
                iconEl.href = "https://gstatic.com";
            } else if (type === 'drive') {
                titleInp.value = "My Drive - Google Drive";
                iconEl.href = "https://gstatic.com";
            } else if (type === 'docs') {
                titleInp.value = "Google Docs";
                iconEl.href = "https://gstatic.com";
            }
            updateTabTitle(titleInp.value);
        }

        // Global Keyboard Event Listening Engine for Intercepting Panics
        window.addEventListener('keydown', function(e) {
            if (e.key === sysConfig.panicKey) {
                // Instantly break context and clean jump domain location
                window.location.replace(sysConfig.panicDestination);
            }
        });
    </script>

</body>
</html>
