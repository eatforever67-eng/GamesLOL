<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 50px; }
        .config-box { background: #1e1e1e; padding: 20px; border-radius: 8px; display: inline-block; }
        input, button { padding: 10px; margin: 5px; border-radius: 4px; border: none; }
        button { background: #007bff; color: white; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>Web Portal</h1>
    <div class="config-box">
        <h3>Customizable Masking & Cleaning</h3>
        <input type="text" id="tabTitle" placeholder="Custom Tab Title (e.g., Google)">
        <input type="text" id="tabIcon" placeholder="Custom Favicon URL"><br>
        <input type="text" id="gameUrl" value="https://now.gg/games/roblox-mini-games/2.html" style="width: 300px;"><br>
        <button onclick="launchCloaked()">Launch Unblocked Roblox</button>
    </div>

    <script src="cloaking.js"></script>
</body>
</html>
