<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- MonkeyGG Stealth Tab Cloak Settings -->
    <title id="tab-title">Classes</title>
    <link id="tab-icon" rel="icon" type="image/png" href="https://gstatic.com">

    <style>
        /* MonkeyGG Dark Theme Interface Colors */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: #0f0f12; color: #ffffff;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Top Bar Interface */
        .top-navbar {
            background-color: #16161c; padding: 12px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #23232f; z-index: 100;
        }
        .nav-home-btn { 
            font-weight: 700; color: #8b5cf6; cursor: pointer; 
            font-size: 18px; text-transform: uppercase; letter-spacing: 1px;
        }
        .panic-info { font-size: 12px; color: #6b7280; background: #20202b; padding: 4px 10px; border-radius: 4px; }

        /* Content Container Toggle Views */
        .view-panel { display: none; flex: 1; width: 100%; height: 100%; overflow: auto; }
        .view-panel.active { display: flex; }

        /* MonkeyGG Game Cards Layout Grid */
        #grid-layout {
            padding: 40px; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px; align-content: start; justify-content: center;
        }
        
        /* Interactive Game Tiles */
        .monkey-card {
            background-color: #16161c; border: 1px solid #23232f; border-radius: 12px;
            overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column; position: relative;
        }
        .monkey-card:hover { 
            transform: scale(1.04); 
            border-color: #8b5cf6; 
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.15);
        }
        .card-image { width: 100%; height: 120px; object-fit: cover; background: #20202b; }
        .card-name { 
            padding: 12px; font-weight: 600; text-align: center; font-size: 14px; 
            color: #e2e8f0; background: #16161c;
        }

        /* Full Window Embedded App Canvas Frame */
        #game-viewport { background: #000; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <!-- Header Control Banner -->
    <div class="top-navbar">
        <span class="nav-home-btn" onclick="openHomeGrid()">🐵 MONKEY.GG Copy</span>
        <span class="panic-info">Emergency Panic Key: Press <b>"Escape"</b> to instantly close</span>
    </div>

    <!-- VIEW 1: Main Platform Game Selection Display Grid -->
    <div id="grid-layout" class="view-panel active">
        
        <!-- GAME TILE 1: AUTOMATED ROBLOX CLOUD PROXY -->
        <div class="monkey-card" onclick="startAppFrame('https://nowgg.nl')">
            <img class="card-image" src="https://unsplash.com" alt="Roblox">
            <div class="card-name">Roblox (Now.gg Proxy)</div>
        </div>

        <!-- GAME TILE 2: ACTIVE VECK.IO CANVAS ENGINE -->
        <div class="monkey-card" onclick="startAppFrame('https://veck.io')">
            <img class="card-image" src="https://unsplash.com" alt="Veck.io">
            <div class="card-name">Veck.io (FPS)</div>
        </div>

    </div>

    <!-- VIEW 2: Operational Game Render Frame Screen -->
    <div id="game-viewport" class="view-panel">
        <iframe id="target-engine-frame" src="" allow="pointer-lock; fullscreen;"></iframe>
    </div>

    <script>
        // Automatic Loop to Swamp the Tab History
        window.onload = function() {
            for (let i = 0; i < 10; i++) {
                window.history.pushState({ systemIndex: i }, "", window.location.pathname + "?class=v" + i);
            }
        };

        function openHomeGrid() {
            document.getElementById('game-viewport').classList.remove('active');
            document.getElementById('grid-layout').classList.add('active');
            document.getElementById('target-engine-frame').src = ""; // Clear memory cache
        }

        function startAppFrame(targetUrl) {
            document.getElementById('grid-layout').classList.remove('active');
            document.getElementById('game-viewport').classList.add('active');
            document.getElementById('target-engine-frame').src = targetUrl;
        }

        // Global Panic Interceptor (Instantly Swaps Tab Location)
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                window.location.replace('https://classroom.google.com');
            }
        });
    </script>
</body>
</html>
