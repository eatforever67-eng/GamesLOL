<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. The Masking Title You Asked For -->
    <title id="tab-title">games lol</title>
    <link id="tab-icon" rel="icon" type="image/png" href="https://gstatic.com">

    <style>
        /* Modern Dark Grid Theme */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: #0d0d11; color: #ffffff;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Top Header Control Bar */
        .top-navbar {
            background-color: #14141c; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #1f1f2e; z-index: 100;
        }
        .nav-home-btn { 
            font-weight: 800; color: #a78bfa; font-size: 22px; 
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .config-btn {
            background: #1f1f2e; border: 1px solid #3b3b4f; color: white;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
        }
        .config-btn:hover { border-color: #a78bfa; background: #2d2d3f; }

        /* The Full-Screen Grid Container (FIXED: Fills the entire screen) */
        .grid-container {
            flex: 1; padding: 40px; overflow-y: auto; height: 100%;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px; justify-content: center; align-content: start;
        }
        
        /* High-Quality Visual Game Cards */
        .monkey-card {
            background-color: #14141c; border: 1px solid #1f1f2e; border-radius: 14px;
            overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column; height: 210px;
        }
        .monkey-card:hover { 
            transform: translateY(-5px); border-color: #a78bfa; 
            box-shadow: 0 12px 30px rgba(167, 139, 250, 0.25);
        }
        .card-image { width: 100%; height: 140px; object-fit: cover; border-bottom: 1px solid #1f1f2e; }
        .card-name { padding: 14px; font-weight: 700; text-align: center; font-size: 15px; color: #f1f5f9; }

        /* Full Custom Settings Sidebar Panel */
        .settings-panel {
            display: none; position: fixed; top: 80px; right: 30px;
            background: #14141c; border: 2px solid #2d2d3f; border-radius: 12px;
            padding: 25px; width: 320px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); z-index: 1000;
        }
        .settings-panel h3 { margin-top: 0; color: #a78bfa; border-bottom: 1px solid #2d2d3f; padding-bottom: 10px; }
        .setting-group { margin-bottom: 18px; }
        .setting-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .setting-group input, .setting-group select {
            width: 100%; background: #1f1f2e; border: 1px solid #3b3b4f; color: white; padding: 10px; border-radius: 6px; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <span class="nav-home-btn" id="nav-logo-text">games lol</span>
        <button class="config-btn" onclick="toggleSettings()">⚙️ Control Settings</button>
    </div>

    <!-- MAIN INTERFACE: Full View Game Grid with Images -->
    <div class="grid-container">
        
        <!-- CARD 1: WORKING VECK.IO HUB -->
        <div class="monkey-card" onclick="openAboutBlank('https://veck.io')">
            <img class="card-image" src="https://unsplash.com" alt="Veck">
            <div class="card-name">Veck.io (FPS Multi)</div>
        </div>

        <!-- CARD 2: UNBLOCKED CLOUD ROBLOX MIRROR (Bypasses nowgg blocks) -->
        <div class="monkey-card" onclick="openAboutBlank('https://now-gg.com')">
            <img class="card-image" src="https://unsplash.com" alt="Roblox">
            <div class="card-name">Roblox Cloud Proxy</div>
        </div>

        <!-- CARD 3: ALTERNATIVE UNBLOCKED CRAZYGAMES GATEWAY -->
        <div class="monkey-card" onclick="openAboutBlank('https://gamedistribution.com')">
            <img class="card-image" src="https://unsplash.com" alt="Games">
            <div class="card-name">CrazyGames Proxy (Slope)</div>
        </div>

    </div>

    <!-- 2. THE COMPLETE CUSTOMIZABLE SETTINGS PAGE -->
    <div class="settings-panel" id="opt-menu">
        <h3>Dashboard Options</h3>
        
        <div class="setting-group">
            <label>Tab Mask Preset</label>
            <select onchange="applyMaskPreset(this.value)">
                <option value="classroom">Google Classroom</option>
                <option value="drive">Google Drive</option>
                <option value="docs">Google Docs</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Custom Tab Title / Name</label>
            <input type="text" id="title-string" value="games lol" oninput="changeTabTitle(this.value)">
        </div>

        <div class="setting-group">
            <label>Custom Tab Icon URL (Favicon)</label>
            <input type="text" id="icon-url-field" value="https://gstatic.com" oninput="changeFavicon(this.value)">
        </div>

        <div class="setting-group">
            <label>Panic Emergency Hotkey</label>
            <input type="text" id="panic-key-field" value="Escape" oninput="updatePanicKey(this.value)">
        </div>

        <div class="setting-group">
            <label>Panic Redirect Address</label>
            <input type="text" id="panic-url-field" value="https://google.com" oninput="updatePanicUrl(this.value)">
        </div>

        <button class="config-btn" style="width:100%; background:#a78bfa; color:#14141c;" onclick="toggleSettings()">Save & Close</button>
    </div>

    <script>
        let runtimeSettings = { key: 'Escape', route: 'https://google.com' };

        // 3. THE ULTIMATE ABOUT:BLANK CLOAKING ENGINE
        function openAboutBlank(targetUrl) {
            const blankWindow = window.open('about:blank', '_blank');
            if (!blankWindow) {
                alert("Popup Blocked! Please click the 'Allow Popups' icon in your browser address bar to launch the game cloaker.");
                return;
            }

            const doc = blankWindow.document;
            
            // Apply Cloaking settings to the brand new tab
            doc.title = document.getElementById('tab-title').innerText;
            
            const newIcon = doc.createElement('link');
            newIcon.rel = 'icon';
            newIcon.type = 'image/png';
            newIcon.href = document.getElementById('tab-icon').href;
            doc.head.appendChild(newIcon);

            // Force Full-Screen view window (Prevents the halfway popup bug)
            doc.body.style.margin = '0';
            doc.body.style.padding = '0';
            doc.body.style.height = '100vh';
            doc.body.style.overflow = 'hidden';
            doc.body.style.backgroundColor = '#000';

            const gameIframe = doc.createElement('iframe');
            gameIframe.src = targetUrl;
            gameIframe.style.width = '100%';
            gameIframe.style.height = '100%';
            gameIframe.style.border = 'none';
            gameIframe.setAttribute('allow', 'pointer-lock; fullscreen;');
            
            doc.body.appendChild(gameIframe);

            // Inject Panic Button listener directly into the new cloaked window tab context
            const scriptBlock = doc.createElement('script');
            scriptBlock.innerHTML = `
                window.addEventListener('keydown', function(e) {
                    if (e.key === "${runtimeSettings.key}") {
                        window.location.replace("${runtimeSettings.route}");
                    }
                });
            `;
            doc.body.appendChild(scriptBlock);
        }

        // Settings Panel Controls
        function toggleSettings() {
            let panel = document.getElementById('opt-menu');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function changeTabTitle(val) { 
            document.getElementById('tab-title').innerText = val; 
            document.getElementById('nav-logo-text').innerText = val;
        }
        
        function changeFavicon(url) { document.getElementById('tab-icon').href = url; }
        function updatePanicKey(val) { runtimeSettings.key = val; }
        function updatePanicUrl(val) { runtimeSettings.route = val; }

        function applyMaskPreset(type) {
            let icon = document.getElementById('tab-icon');
            let title = document.getElementById('tab-title');
            let field = document.getElementById('icon-url-field');
            if(type === 'classroom') {
                changeTabTitle("Classes"); icon.href = "https://gstatic.com";
            } else if(type === 'drive') {
                changeTabTitle("My Drive - Google Drive"); icon.href = "https://gstatic.com";
            } else if(type === 'docs') {
                changeTabTitle("Google Docs"); icon.href = "https://gstatic.com";
            }
            field.value = icon.href;
        }

        // Main Page Panic Hotkey Listener
